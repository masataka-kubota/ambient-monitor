name: 🛡️ Setup safe-chain
description: Install safe-chain at a pinned version for supply chain protection

runs:
  using: composite
  steps:
    - name: 🛡️ Install safe-chain
      shell: bash
      env:
        SAFE_CHAIN_VERSION: "1.5.7"
      run: |
        curl -fsSL \
          "https://github.com/AikidoSec/safe-chain/releases/download/${SAFE_CHAIN_VERSION}/install-safe-chain.sh" \
          | sh -s -- --ci
