name: 🛡️ Setup safe-chain
description: Install safe-chain at a pinned version for supply chain protection

runs:
  using: composite
  steps:
    - name: 🛡️ Install safe-chain
      shell: bash
      env:
        SAFE_CHAIN_VERSION: "1.5.7"
        INSTALLER_SHA256: "07ab512fd8795ce41b2275be369aced4c9a93cc7bca9b397951507891a955239"
      run: |
        set -euo pipefail

        installer="$(mktemp)"
        trap 'rm -f "$installer"' EXIT

        curl -fsSL \
          "https://github.com/AikidoSec/safe-chain/releases/download/${SAFE_CHAIN_VERSION}/install-safe-chain.sh" \
          -o "$installer"
        echo "${INSTALLER_SHA256}  ${installer}" | sha256sum -c -
        sh "$installer" --ci
