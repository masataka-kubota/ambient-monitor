name: Backend CI

on:
  pull_request:
    paths:
      - "packages/backend/**"
      - ".github/workflows/backend-ci.yml"
      - ".tool-versions"
    branches: ["main", "develop"]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: ".tool-versions"

      - name: Install dependencies (root/workspace)
        run: bun install --filter backend --frozen-lockfile

      - name: Generate Cloudflare types
        run: bun run --filter backend cf-typegen

      - name: Type-check
        run: bun run --filter backend type-check

      - name: Lint
        run: bun run --filter backend lint

      - name: Run tests
        run: bun run --filter backend test
