name: EAS Production Build

on:
  pull_request:
    types: [closed]
    branches: ["main"]
    paths:
      - "packages/mobile/**"
      - ".github/workflows/eas-production-build.yml"
      - ".tool-versions"

jobs:
  eas-build:
    if: |
      github.event.pull_request.merged == true &&
      (
        contains(github.event.pull_request.labels.*.name, 'eas-build-android:production') ||
        contains(github.event.pull_request.labels.*.name, 'eas-build-ios:production')
      )
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/mobile

    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: 🏗 Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".tool-versions"

      - name: 🏗 Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: ".tool-versions"

      - name: 🏗 Setup EAS CLI
        uses: expo/expo-github-action@eab7a230208c952974db8c3245cfd78402c7b385 # v9.0.0
        with:
          eas-version: "20.1.0"
          packager: bun
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: bun install --filter mobile --frozen-lockfile

      - name: 🚀 Build Android
        if: contains(github.event.pull_request.labels.*.name, 'eas-build-android:production')
        run: eas build --platform android --profile production --non-interactive

      - name: 🚀 Build iOS
        if: contains(github.event.pull_request.labels.*.name, 'eas-build-ios:production')
        run: eas build --platform ios --profile production --non-interactive
