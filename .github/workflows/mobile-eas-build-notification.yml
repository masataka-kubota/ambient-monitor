name: Mobile EAS Build Notification

on:
  pull_request:
    types: [labeled, unlabeled]
    branches: ["main", "staging"]
    paths:
      - "packages/mobile/**"
      - ".github/workflows/mobile-eas-build-notification.yml"

jobs:
  manage-comments:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: 🔄 Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: 🤖 Manage PR comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;

            const currentLabels = pr.labels.map(l => l.name);

            const BOT_MARKER = "### 🤖 EAS Build notification";
            const ANDROID_LABEL = "eas-build-android";
            const IOS_LABEL = "eas-build-ios";

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100,
            });
            const currentBotComment = comments.find(
              c => c.user.login === "github-actions[bot]" && c.body.includes(BOT_MARKER)
            );

            const hasAndroidLabel = currentLabels.includes(ANDROID_LABEL);
            const hasIosLabel = currentLabels.includes(IOS_LABEL);

            if (!hasAndroidLabel && !hasIosLabel) {
              if (currentBotComment) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: currentBotComment.id
                });
              }
              return;
            }

            const easProfile = pr.base.ref === "main" ? "production" : "preview";

            let message = `${BOT_MARKER}\n`;
            message += "This PR is marked for an EAS Build on merge:\n\n";
            message += `- Base branch: \`${pr.base.ref}\`\n`;
            message += `- EAS profile on merge: \`${easProfile}\`\n\n`;
            message += `- ${hasAndroidLabel ? "✅" : "⬜"} **Android build will be triggered after merge** 🚀\n(triggered by label: \`${ANDROID_LABEL}\`)\n`;
            message += `- ${hasIosLabel ? "✅" : "⬜"} **iOS build will be triggered after merge** 🚀\n(triggered by label: \`${IOS_LABEL}\`)\n`;

            if (currentBotComment) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: currentBotComment.id
              });
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: message
            });
