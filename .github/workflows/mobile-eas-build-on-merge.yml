name: Mobile EAS Build On Merge

on:
  pull_request:
    types: [closed]
    branches: ["main", "staging"]
    paths:
      - "packages/mobile/**"
      - ".github/workflows/mobile-eas-build-on-merge.yml"
      - ".github/actions/setup-safe-chain/**"
      - ".tool-versions"

concurrency:
  group: eas-mobile-build-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  eas-build:
    if: |
      github.event.pull_request.merged == true &&
      (
        contains(github.event.pull_request.labels.*.name, 'eas-build-android') ||
        contains(github.event.pull_request.labels.*.name, 'eas-build-ios')
      )
    runs-on: ubuntu-latest
    env:
      EAS_PROFILE: ${{ github.event.pull_request.base.ref == 'main' && 'production' || 'preview' }}

    steps:
      - name: 🔄 Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: 🏗 Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".tool-versions"

      - name: 🏗 Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: ".tool-versions"

      - name: 🏗 Setup EAS CLI
        uses: expo/expo-github-action@eab7a230208c952974db8c3245cfd78402c7b385 # v9.0.0
        with:
          eas-version: "20.1.0"
          packager: bun
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 🛡️ Setup safe-chain
        uses: ./.github/actions/setup-safe-chain

      - name: 🏗 Build backend types
        run: |
          bun install --filter backend --frozen-lockfile
          bun run --filter backend build:types

      - name: 📦 Install dependencies
        run: bun install --filter mobile --frozen-lockfile

      - name: ⚙️ Build Android
        if: contains(github.event.pull_request.labels.*.name, 'eas-build-android')
        working-directory: packages/mobile
        run: eas build --platform android --profile $EAS_PROFILE --non-interactive --no-wait

      - name: ⚙️ Build iOS
        if: contains(github.event.pull_request.labels.*.name, 'eas-build-ios')
        working-directory: packages/mobile
        run: eas build --platform ios --profile $EAS_PROFILE --non-interactive --no-wait
