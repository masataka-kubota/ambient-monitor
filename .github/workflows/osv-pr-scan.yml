name: OSV PR Scan

on:
  pull_request:
    branches: [develop, main]

permissions:
  actions: read
  security-events: write
  contents: read
  pull-requests: read

jobs:
  determine-targets:
    name: Determine scan targets
    runs-on: ubuntu-latest
    outputs:
      scan: ${{ steps.set-targets.outputs.scan }}
    steps:
      - name: 🔄 Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: 🔍 Set scan target flags
        id: set-targets
        run: |
          set -euo pipefail

          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"

          # Fetch exact PR base/head commits and diff directly.
          # This avoids three-dot merge-base failures on shallow clones.
          git fetch --no-tags --prune --depth=1 origin "$base_sha" "$head_sha"
          changed_files="$(git diff --name-only "$base_sha" "$head_sha")"

          if printf '%s\n' "$changed_files" | grep -qE '^(packages/backend/|packages/mobile/|bun\.lock|package\.json|\.github/workflows/osv-pr-scan\.yml)'; then
            echo "scan=true" >> "$GITHUB_OUTPUT"
          else
            echo "scan=false" >> "$GITHUB_OUTPUT"
          fi

  osv-scan:
    name: OSV scan
    needs: determine-targets
    if: needs.determine-targets.outputs.scan == 'true'
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@c51854704019a247608d928f370c98740469d4b5 # v2.3.5
    with:
      upload-sarif: false
      scan-args: |
        --lockfile bun.lock
